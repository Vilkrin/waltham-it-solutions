<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page Not Found | Waltham IT Solutions</title>
    <meta name="description" content="Sorry, we couldn't find the page you're looking for." />
    <meta name="author" content="Waltham IT Solutions" />
    <link rel="icon" href="../public/favicon.ico" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      />
    </noscript>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
      @theme {
        --color-background: hsl(0 0% 100%);
        --color-foreground: hsl(210 11% 15%);

        --color-primary: hsl(210 100% 20%);
        --color-primary-foreground: hsl(0 0% 100%);
        --color-primary-light: hsl(210 100% 25%);

        --color-secondary: hsl(174 77% 35%);
        --color-secondary-foreground: hsl(0 0% 100%);
        --color-secondary-light: hsl(174 77% 45%);

        --color-muted: hsl(210 20% 96%);
        --color-muted-foreground: hsl(210 6% 46%);
        --color-muted-dark: hsl(210 15% 85%);

        --color-card: hsl(0 0% 100%);
        --color-card-foreground: hsl(210 11% 15%);
        --color-card-border: hsl(210 20% 90%);

        --color-accent: hsl(174 77% 35%);
        --color-accent-foreground: hsl(0 0% 100%);
        --color-accent-hover: hsl(174 77% 30%);

        --color-border: hsl(210 20% 90%);
        --color-input: hsl(210 20% 96%);
        --color-ring: hsl(174 77% 35%);

        --color-success: hsl(142 76% 36%);
        --color-warning: hsl(38 92% 50%);
        --color-destructive: hsl(0 84% 60%);
        --color-destructive-foreground: hsl(0 0% 100%);
      }

      @layer base {
        html {
          font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial,
            "Noto Sans", "Liberation Sans", sans-serif;
        }
        body {
          @apply bg-muted text-foreground;
        }
        :focus-visible {
          outline: 2px solid theme(colors.ring);
          outline-offset: 2px;
        }
      }
    </style>
  </head>

  <body>
    <main class="flex min-h-screen items-center justify-center">
      <div class="text-center max-w-md mx-auto px-6">
        <div class="mb-8">
          <div class="w-24 h-24 text-muted-foreground mx-auto mb-4 grid place-items-center text-5xl" aria-hidden="true">⌕</div>
          <h1 class="text-6xl font-bold text-foreground mb-4">404</h1>
          <h2 class="text-2xl font-semibold text-foreground mb-2">Page Not Found</h2>
          <p class="text-muted-foreground mb-8">
            Sorry, we couldn't find the page you're looking for. The page may have been moved or doesn't exist.
          </p>
        </div>

        <div class="space-y-4">
          <a
            class="inline-flex w-full items-center justify-center rounded-md bg-secondary px-6 py-3 text-base font-semibold text-secondary-foreground shadow-sm hover:bg-accent-hover transition-colors"
            href="./index.html"
          >
            Return to Home
          </a>

          <a
            class="inline-flex w-full items-center justify-center rounded-md border border-border bg-white px-6 py-3 text-base font-semibold text-foreground hover:border-primary/50 transition-colors"
            href="./services.html"
          >
            View Our Services
          </a>
        </div>
      </div>
    </main>
  </body>
</html>
